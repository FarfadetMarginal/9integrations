<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>999999999999999</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/style.css">
</head>
<body>

<div class="cursor" id="cursor"></div>

<div class="scene">
  <div class="orbit-ring" id="orbitRing">

    <svg class="track" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
      <!-- Main orbit circle -->
      <circle cx="300" cy="300" r="300" fill="none" stroke="#d0c9be" stroke-width="1" stroke-dasharray="2 8"/>
      <!-- Tick marks every 40deg -->
      <g id="ticks"></g>
    </svg>

    <!-- Center hub -->
    <div class="center-hub">
      <svg class="hub-cross" viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">
        <line x1="35" y1="0" x2="35" y2="70" stroke="#222" stroke-width=".8"/>
        <line x1="0" y1="35" x2="70" y2="35" stroke="#222" stroke-width=".8"/>
        <circle cx="35" cy="35" r="4" fill="#222"/>
        <circle cx="35" cy="35" r="18" fill="none" stroke="#ccc" stroke-width=".6"/>
      </svg>
    </div>

  </div>
</div>
<script src="js/script.js"></script>
</body>
</html>
